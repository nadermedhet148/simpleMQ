quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=jdbc:sqlite:simplemq.db?busy_timeout=5000
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.hibernate-orm.log.sql=true

# Cluster configuration
simplemq.cluster.node-id=${NODE_ID:node1}
simplemq.cluster.address=${NODE_ADDRESS:localhost:9851}
simplemq.cluster.peers=${CLUSTER_PEERS:node1=localhost:9851}

# Persistence configuration
simplemq.persistence.enabled=${SIMPLEMQ_PERSISTENCE_ENABLED:true}

# Visibility timeout: how long (ms) a delivered message waits for ACK/NACK before being requeued
simplemq.visibility.timeout-ms=${SIMPLEMQ_VISIBILITY_TIMEOUT_MS:30000}

# Test profile: use high ports to avoid conflicting with a running Docker cluster (9851-9853)
# and Docker NGINX on 8080.
%test.quarkus.http.port=18080
%test.quarkus.http.test-port=18080
%test.simplemq.cluster.address=localhost:19851
%test.simplemq.cluster.peers=node1=localhost:19851
