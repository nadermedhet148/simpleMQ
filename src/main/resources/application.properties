# =============================================================================
# simpleMQ Broker Configuration
# =============================================================================

# --- Database (SQLite via Hibernate ORM) ---
# SQLite is used for durable message persistence and metadata storage.
# busy_timeout prevents "database is locked" errors under concurrent access.
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=jdbc:sqlite:simplemq.db?busy_timeout=5000
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.hibernate-orm.log.sql=true

# --- Cluster Configuration (Raft Consensus) ---
# node-id:  Unique identifier for this broker node in the cluster.
# address:  The Raft gRPC address (host:port) this node listens on.
# peers:    Comma-separated list of all cluster nodes in "id=host:port" format.
simplemq.cluster.node-id=${NODE_ID:node1}
simplemq.cluster.address=${NODE_ADDRESS:localhost:9851}
simplemq.cluster.peers=${CLUSTER_PEERS:node1=localhost:9851}

# --- Persistence Configuration ---
# When enabled (default), messages are persisted to SQLite for durability.
# Set to false for ephemeral mode (in-memory only, no crash recovery).
simplemq.persistence.enabled=${SIMPLEMQ_PERSISTENCE_ENABLED:true}

# --- Visibility Timeout ---
# How long (in milliseconds) a delivered message waits for ACK/NACK before
# being automatically requeued for another consumer. Default: 30 seconds.
simplemq.visibility.timeout-ms=${SIMPLEMQ_VISIBILITY_TIMEOUT_MS:30000}

# --- Test Profile Overrides ---
# Use high ports to avoid conflicting with a running Docker cluster (9851-9853)
# and Docker NGINX on 8080.
%test.quarkus.http.port=18080
%test.quarkus.http.test-port=18080
%test.simplemq.cluster.address=localhost:19851
%test.simplemq.cluster.peers=node1=localhost:19851
